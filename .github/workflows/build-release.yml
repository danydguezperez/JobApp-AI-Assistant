name: Build and Release Windows exe

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        shell: pwsh
        run: |
          pyinstaller `
            --onefile `
            --noconsole `
            --name "JobApp-AI-Assistant-Windows" `
            --add-data "static;static" `
            --add-data "templates;templates" `
            --add-data "docs/vendor;docs/vendor" `
            --add-data "pagbiomics_embed.html;." `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import jobapp_ai_assistant `
            --hidden-import multipart `
            --hidden-import pypdf `
            --hidden-import docx `
            --hidden-import reportlab `
            --hidden-import bs4 `
            --hidden-import httpx `
            launcher.py

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/JobApp-AI-Assistant-Windows.exe
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
